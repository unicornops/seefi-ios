name: Seefi
options:
  bundleIdPrefix: com.seefi

# Project-level Release settings: "Automatic" for SPM dependencies (they don't support
# provisioning profiles). Seefi target overrides with specific profile UUID.
settings:
  configs:
    Release:
      PROVISIONING_PROFILE_SPECIFIER: "Automatic"
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "14.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

schemes:
  Seefi:
    build:
      targets:
        Seefi: all
    run:
      executable: Seefi

packages:
  GCDWebServer:
    url: https://github.com/LRSnowX/GCDWebServer
    from: "3.5.4"

targets:
  Seefi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Seefi
        excludes:
          - "*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ie.unicornops.seefi
        INFOPLIST_FILE: Seefi/Info.plist
        CODE_SIGN_ENTITLEMENTS: Seefi/Seefi.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        OTHER_SWIFT_FLAGS: "-Xcc -Wno-deprecated-declarations"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "iPhone Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "PROFILE_UUID_PLACEHOLDER"
    dependencies:
      - package: GCDWebServer
        product: GCDWebServers
      - sdk: NetworkExtension.framework
    info:
      path: Seefi/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: "Seefi receives photos from your Wi-Fi SD card. Allow local network access so the card can send photos to your device."
        NSPhotoLibraryAddUsageDescription: "Export received photos to your Photos library."
        NSPhotoLibraryUsageDescription: "Export received photos to your Photos library."
        UIBackgroundModes: []
